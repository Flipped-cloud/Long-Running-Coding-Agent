model:
  provider: openai_compatible
  model_name: ${MODEL_NAME}
  base_url: ${OPENAI_BASE_URL}
  api_key_env: OPENAI_API_KEY
  temperature: 0.0
  max_output_tokens: 4096
  request_timeout_seconds: 180
  max_api_retries: 3
workspace:
  root: ../examples/verification_bench/full_fix
planning:
  mode: static
  initial_plan:
    min_tasks: 1
    max_tasks: 1
    max_protocol_retries: 2
  execution:
    max_project_sessions: 4
    max_sessions_per_task: 2
    max_project_seconds: 480
state:
  root: ../.runs/projects
  atomic_write: true
verification:
  mode: contract
  contract:
    source: file
    path: ../examples/verification_bench/contracts/full_fix.yaml
    freeze_on_project_start: true
  execution:
    isolation: copy
    timeout_seconds: 120
    max_parallel_checks: 1
    preserve_failed_snapshot: true
  policy:
    require_project_contract: true
    max_task_reopens: 2
    max_project_verification_attempts: 3
  generated_tests:
    enabled: false
agent:
  max_steps: 20
  max_consecutive_errors: 5
  max_session_seconds: 180
  terminal_grace_turns: 1
  protocol_retries_per_step: 2
