contract_id: local-generated-test
project_id: __PROJECT_ID__
scope: project
source: fixture
hidden_assets_root: ../hidden_assets/generated_test
checks:
  - {check_id: value-resolution, title: Value resolution, kind: resolution, visibility: hidden, argv: [python, -m, pytest, -q, hidden_tests/test_resolution.py], required: true}
  - {check_id: type-regression, title: Type regression, kind: regression, visibility: public, argv: [python, -m, pytest, -q, tests/test_regression.py], required: true}
integrity_rules: {trusted_test_patterns: [tests/test_regression.py], protected_paths: [tests/test_regression.py]}
generated_test_policy: {enabled: true, can_be_required: false, max_candidates_per_task: 3}
