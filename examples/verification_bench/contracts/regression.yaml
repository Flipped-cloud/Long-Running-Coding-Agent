contract_id: local-regression
project_id: __PROJECT_ID__
scope: project
source: fixture
hidden_assets_root: ../hidden_assets/regression
checks:
  - {check_id: negative, title: Negative resolution, kind: resolution, visibility: hidden, argv: [python, -m, pytest, -q, hidden_tests/test_resolution.py], required: true}
  - {check_id: positive, title: Positive regression, kind: regression, visibility: public, argv: [python, -m, pytest, -q, tests/test_public.py], required: true}
integrity_rules: {trusted_test_patterns: [tests/*.py], protected_paths: [tests/test_public.py]}
